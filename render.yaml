services:
  - type: web
    name: agenda-medica
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agenda-medica-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: APP_TIMEZONE
        value: "America/Sao_Paulo"
      - key: APP_PUBLIC_URL
        value: "https://agenda-medica-2c9b.onrender.com"
      - key: APP_NAME
        value: "Agenda Médica"
      - key: SCHEDULER_ENABLED
        value: "false"
      # Mercado Pago (preencha manualmente no dashboard do Render)
      # - key: MERCADOPAGO_ACCESS_TOKEN
      #   value: APP_USR-...
      # E-mail (preencha manualmente no dashboard do Render)
      # - key: SMTP_HOST
      #   value: smtp.gmail.com
      # - key: SMTP_PORT
      #   value: "587"
      # - key: SMTP_USE_TLS
      #   value: "true"
      # - key: SMTP_USER
      #   value: seu@gmail.com
      # - key: SMTP_PASSWORD
      #   value: sua-senha-de-app
      # - key: SMTP_FROM_EMAIL
      #   value: seu@gmail.com
      # - key: SMTP_FROM_NAME
      #   value: Agenda Médica
      # WhatsApp Cloud API (preencha manualmente no dashboard do Render)
      # - key: WHATSAPP_ACCESS_TOKEN
      #   value: EA...
      # - key: WHATSAPP_PHONE_NUMBER_ID
      #   value: "1234567890"
      # - key: WHATSAPP_BUSINESS_ACCOUNT_ID
      #   value: "1234567890"
      # - key: WHATSAPP_API_VERSION
      #   value: v20.0
      # - key: WHATSAPP_TEMPLATE_LANGUAGE
      #   value: pt_BR
      # - key: WHATSAPP_PATIENT_TEMPLATE_NAME
      #   value: agenda_paciente_lembrete
      # - key: WHATSAPP_DOCTOR_TEMPLATE_NAME
      #   value: agenda_medico_resumo

  - type: cron
    name: agenda-medica-lembretes
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m backend.scripts.send_email_reminders --dias 1 --dias 2
    # Render usa UTC no cron: 11:00 UTC = 08:00 em America/Sao_Paulo.
    schedule: "0 11 * * *"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agenda-medica-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: APP_TIMEZONE
        value: "America/Sao_Paulo"
      - key: APP_PUBLIC_URL
        value: "https://agenda-medica-2c9b.onrender.com"
      - key: APP_NAME
        value: "Agenda Médica"
      # E-mail (preencha no dashboard do Render também para o cron)
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: Agenda Médica
      # WhatsApp Cloud API (preencha no dashboard do Render)
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v20.0
      - key: WHATSAPP_TEMPLATE_LANGUAGE
        value: pt_BR
      - key: WHATSAPP_PATIENT_TEMPLATE_NAME
        sync: false
      - key: WHATSAPP_DOCTOR_TEMPLATE_NAME
        sync: false

databases:
  - name: agenda-medica-db
    databaseName: agenda_medica
    user: agenda_medica
    plan: free
